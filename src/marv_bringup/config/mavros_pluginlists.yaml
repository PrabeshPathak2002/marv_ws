# Minimal MAVROS plugins for Marv ArduSub pre-qual (avoids plugin/service collisions).
# Do NOT add param — it fights QGC parameter download over MAVProxy.
# command is required for /mavros/cmd/arming on bench (arm_vehicle.sh).
/**:
  ros__parameters:
    plugin_allowlist:
      - sys_status
      - sys_time
      - imu
      - local_position
      - rc_io
      - setpoint_velocity
      - command
