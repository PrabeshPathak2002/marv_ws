# MAVROS — GCS identity must differ from FCU (system 1) so RC override works.
# fcu_url is set by mavros.launch.py / launch args (default udp://@127.0.0.1:14555).
/**:
  ros__parameters:
    system_id: 255
    component_id: 240
    target_system_id: 1
    target_component_id: 1

# Ping1D via FCU MAVLink (DISTANCE_SENSOR id=0, orientation PITCH_270 / 25).
/**/distance_sensor:
  ros__parameters:
    config: |
      rangefinder_pub:
        id: 0
        frame_id: "lidar"
        orientation: 25
        field_of_view: 0.0
        send_tf: false
        sensor_position: {x: 0.0, y: 0.0, z: -0.1}
