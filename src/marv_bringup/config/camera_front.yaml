# Blue Robotics DeepWater Exploration exploreHD USB (front camera).
# Stable path: run setup_hardware_rules.sh -> /dev/explore_hd (MJPEG node).
# Fallback without udev: first /dev/video* in exploreHD group (v4l2-ctl --list-devices).
#
# Verify: scripts/check_explorehd.sh /dev/explore_hd

camera_front:
  model: exploreHD
  device: /dev/explore_hd
  fourcc: MJPG
  width: 1280
  height: 720
  fps: 30
