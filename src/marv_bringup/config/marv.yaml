# Marv AUV vehicle and behavior configuration (per-vehicle profile).
# Inspired by Inspiration Robotics config/onyx.json and EagleAUV ros2_ws pre-qual.

vehicle:
  name: marv
  # ArduSub FRAME_CLASS: VECTORED_6DOF (8 thrusters — mixing done in firmware).
  frame: VECTORED_6DOF
  thrusters: 8
  # MAVROS via MAVProxy local UDP (start_telemetry_bridge.sh first).
  fcu_url: udp://@127.0.0.1:14555

control:
  target_depth_m: 1.0
  depth_kp: 0.25
  home_xy: [0.0, 0.0]
  command_smooth_step: 0.06

# Blue Robotics exploreHD USB — front camera on Jetson (/dev/video*).
camera_front:
  model: exploreHD
  device: /dev/explore_hd
  fourcc: MJPG
  width: 1280
  height: 720
  fps: 30

# Ping1D — range via FCU MAVLink (wired to ARK FPV serial port).
ping:
  connection: mavlink
  mavros_topic: /mavros/distance_sensor/lidar
  forward_topic: /sensors/range_forward
  obstacle_stop_m: 0.8
  approach_slow_m: 2.5
  gate_clear_m: 2.5
  stop_m: 0.6

behaviors:
  wait_submerged:
    duration_s: 5.0
  find_gate:
    gate_classes: [gate]
    conf_min: 0.20
    search_yaw: 0.18
    forward_surge: 0.15
  find_return_gate:
    gate_classes: [gate]
    conf_min: 0.20
    search_yaw: 0.12
    forward_surge: 0.48
  traverse_gate:
    gate_classes: [gate]
    conf_min: 0.20
    center_deadband: 0.20
    commit_area: 0.45
    commit_deadband: 0.08
    surge_approach: 0.55
    yaw_kp: 0.35
    gate_max_yaw: 0.25
    approach_slow_m: 2.5
    stop_m: 0.6
  detect_path:
    path_classes: [path]
    conf_min: 0.35
    lost_frames_limit: 30
    min_runtime_s: 5.0
  return_home:
    arrive_radius_m: 0.3
  pass_gate:
    surge_speed: 0.65
    duration_s: 7.0
    gate_clear_m: 2.5
    approach_slow_m: 2.5
    stop_m: 0.6
    use_ping_complete: true
  transit_forward:
    surge_speed: 0.60
    min_transit_s: 6.0
    max_transit_s: 20.0
    marker_classes: [obstacle, neon_orange, yellow_pole]
    conf_min: 0.25
    use_timed_transit: false  # pose-based 10 m transit when mapping_node publishes /sensors/map_pose
  find_marker:
    marker_classes: [obstacle, neon_orange, yellow_pole]
    conf_min: 0.25
    search_yaw: 0.12
    forward_surge: 0.35
  approach_marker:
    marker_classes: [obstacle, neon_orange, yellow_pole]
    conf_min: 0.25
    center_deadband: 0.12
    close_area: 0.055
    area_kp: 9.0
    max_surge: 0.38
    min_surge: 0.15
    yaw_kp: 0.55
    max_yaw: 0.28
  circle_marker:
    marker_classes: [obstacle, neon_orange, yellow_pole]
    conf_min: 0.25
    orbit_duration_s: 24.0
    side_step_duration_s: 5.0
    side_pass_duration_s: 7.0
    cross_behind_duration_s: 7.0
    u_sway_speed: -0.32
    u_cross_sway_speed: 0.36
    u_forward_speed: 0.38
    search_yaw: 0.12
    yaw_kp: 0.55
    max_yaw: 0.28
  pass_gate_clear:
    surge_speed: 0.65
    duration_s: 7.0
    use_ping_complete: false
  turn_around:
    target_delta_rad: 3.14159
    yaw_rate: 0.30
